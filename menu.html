<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Меню</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <div class="logo">Pastel Coffee</div>
  <nav>
    <a href="index.html">Главная</a>
    <a href="menu.html">Меню</a>
    <a href="about.html">О нас</a>
    <a href="bookings.html">Мои брони</a>
  </nav>
</header>

<section class="section active">
  <div class="card">
    <h2>Меню</h2>

    <div class="menu-tabs">
      <button onclick="showCategory('coffee')" class="active">Кофе</button>
      <button onclick="showCategory('dessert')">Десерты</button>
    </div>

    <div id="coffee">
      <div class="menu-item">Капучино — 250₽</div>
      <div class="menu-item">Латте — 270₽</div>
    </div>

    <div id="dessert" class="hidden">
      <div class="menu-item">Чизкейк — 320₽</div>
    </div>
  </div>
</section>

<script>
function showCategory(cat){
  document.getElementById('coffee').classList.add('hidden');
  document.getElementById('dessert').classList.add('hidden');
  document.getElementById(cat).classList.remove('hidden');
}
</script>

</body>
</html>
