<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel Coffee</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <div class="logo"><i data-lucide="coffee"></i>Pastel Coffee</div>
  <nav>
    <a onclick="showSection('home')">Главная</a>
    <a onclick="showSection('menu')">Меню</a>
    <a onclick="showSection('about')">О нас</a>
    <a onclick="showSection('myBookings')">Мои брони</a>
  </nav>
  <button onclick="openBooking()">Бронь</button>
</header>

<div class="sections">

<section id="home" class="section active">
  <h1>Pastel Coffee</h1>
</section>

<section id="menu" class="section">
  <div class="card">
    <h2>Меню</h2>

    <div class="menu-tabs">
      <button onclick="showCategory('coffee')" class="active">Кофе</button>
      <button onclick="showCategory('dessert')">Десерты</button>
    </div>

    <div id="coffee">
      <div class="menu-item">Капучино — 250₽</div>
    </div>

    <div id="dessert" class="hidden">
      <div class="menu-item">Чизкейк — 320₽</div>
    </div>
  </div>
</section>

<section id="about" class="section">
  <div class="card">
    <h2>О нас</h2>
  </div>
</section>

<section id="myBookings" class="section">
  <div class="card">
    <h2>Мои брони</h2>
    <div id="bookingList"></div>
  </div>
</section>

</div>

<div class="card" id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="signUp()">Регистрация</button>
  <button onclick="signIn()">Войти</button>
  <p id="authMsg"></p>
</div>

<div class="card hidden" id="booking">
  <input type="date" id="date">
  <input type="time" id="time">
  <input type="number" id="guests">
  <button onclick="book()">Подтвердить</button>
  <p id="bookMsg"></p>
</div>

<script src="./config.js"></script>
<script src="./js/app.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/booking.js"></script>

</body>
</html>
